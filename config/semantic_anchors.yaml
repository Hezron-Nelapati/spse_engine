anchors:
  - label: "sarcasm_yeah_right"
    category: "rhetorical"
    probe_phrases:
      - "yeah right"
      - "oh sure"
      - "as if"
      - "what a surprise"
  - label: "sarcasm_obviously"
    category: "rhetorical"
    probe_phrases:
      - "obviously not"
      - "sure thing"
      - "totally fine"
  - label: "irony_wonderful"
    category: "rhetorical"
    probe_phrases:
      - "just wonderful"
      - "great job"
      - "nice going"
  - label: "understatement"
    category: "rhetorical"
    probe_phrases:
      - "not ideal"
      - "a bit much"
      - "slightly concerning"

  - label: "hypothetical_what_if"
    category: "epistemic"
    probe_phrases:
      - "what if"
      - "suppose that"
      - "imagine if"
      - "in that scenario"
  - label: "speculation"
    category: "epistemic"
    probe_phrases:
      - "could it be"
      - "i wonder"
      - "might happen"
      - "possibly"
  - label: "conditional"
    category: "epistemic"
    probe_phrases:
      - "if this then"
      - "assuming that"
      - "in case"
  - label: "uncertainty"
    category: "epistemic"
    probe_phrases:
      - "not sure"
      - "unclear whether"
      - "it depends"

  - label: "polite_request"
    category: "pragmatic"
    probe_phrases:
      - "would you mind"
      - "could you please"
      - "can you help"
      - "please do"
  - label: "direct_command"
    category: "pragmatic"
    probe_phrases:
      - "please send"
      - "go ahead"
      - "do this"
      - "let us"
  - label: "suggestion"
    category: "pragmatic"
    probe_phrases:
      - "you should"
      - "i recommend"
      - "it would help"
  - label: "permission"
    category: "pragmatic"
    probe_phrases:
      - "may i"
      - "am i allowed"
      - "is it okay"

  - label: "gratitude"
    category: "emotional"
    probe_phrases:
      - "thank you"
      - "many thanks"
      - "appreciate it"
  - label: "frustration"
    category: "emotional"
    probe_phrases:
      - "so frustrating"
      - "i am annoyed"
      - "this is ridiculous"
  - label: "excitement"
    category: "emotional"
    probe_phrases:
      - "this is amazing"
      - "so exciting"
      - "cannot wait"
  - label: "disappointment"
    category: "emotional"
    probe_phrases:
      - "i am disappointed"
      - "that is unfortunate"
      - "sadly"
