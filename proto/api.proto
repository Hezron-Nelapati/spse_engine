syntax = "proto3";

package spse.api.v1;

message TrainRequest {
  string mode = 1;
  string execution_mode = 2;
}

message AcceptedJob {
  string job_id = 1;
}

message ApiError {
  string error = 1;
}

message QueueDepths {
  uint32 inference = 1;
  uint32 interactive_training = 2;
  uint32 silent_batch = 3;
  uint32 maintenance = 4;
}

message TrainingMetrics {
  float new_unit_rate = 1;
  float unit_discovery_efficiency = 2;
  float semantic_routing_accuracy = 3;
  float prediction_error = 4;
  sint64 memory_delta_kb = 5;
  float search_trigger_precision = 6;
}

message TrainingPhaseStatus {
  string phase = 1;
  string status = 2;
  uint32 batches_completed = 3;
  uint32 batches_target = 4;
  uint32 sources_processed = 5;
  uint32 sources_total = 6;
  TrainingMetrics metrics = 7;
}

message TrainingProgress {
  float percent_complete = 1;
  uint32 sources_processed = 2;
  uint32 sources_total = 3;
  string active_source = 4;
  uint64 chunks_processed = 5;
  uint64 bytes_processed = 6;
}

message TrainingEfficiencyMetrics {
  float units_discovered_per_kb = 1;
  float pruned_units_percent = 2;
  float anchor_density = 3;
  float units_discovered_per_mb = 4;
  float candidate_to_active_ratio = 5;
  float pruned_candidates_percent = 6;
  float avg_observations_to_promotion = 7;
  float map_rebuild_frequency = 8;
  float cache_hit_rate = 9;
  float bloom_filter_false_positive_rate = 10;
}

message DatabaseHealthMetrics {
  uint64 total_units = 1;
  uint64 core_units = 2;
  uint64 episodic_units = 3;
  uint64 anchor_units = 4;
  uint64 intent_units = 5;
  uint64 reasoning_units = 6;
  string maturity_stage = 7;
  uint64 active_units = 8;
  uint64 candidate_units = 9;
  uint64 validated_candidates = 10;
  uint64 active_candidates = 11;
  uint64 rejected_candidates = 12;
  uint64 pruned_units = 13;
  float wal_size_mb = 14;
  float index_fragmentation = 15;
}

message MemoryGovernanceMetrics {
  float episodic_memory_mb = 1;
  float core_memory_mb = 2;
  float candidate_pool_mb = 3;
  float daily_growth_mb = 4;
  float pruning_rate_per_hour = 5;
}

message LearningMetrics {
  uint64 new_units_discovered = 1;
  uint64 units_pruned = 2;
  sint64 memory_delta_kb = 3;
  uint64 map_adjustments = 4;
  uint64 anchors_protected = 5;
  TrainingEfficiencyMetrics efficiency = 6;
  DatabaseHealthMetrics database_health = 7;
  MemoryGovernanceMetrics memory_governance = 8;
}

message PerformanceMetrics {
  uint64 avg_ms_per_source = 1;
  QueueDepths queue_depths = 2;
}

message IntentCount {
  string key = 1;
  uint64 value = 2;
}

message TrainingJobStatus {
  string job_id = 1;
  string status = 2;
  string active_phase = 3;
  repeated TrainingPhaseStatus phase_statuses = 4;
  TrainingProgress progress = 5;
  LearningMetrics learning_metrics = 6;
  PerformanceMetrics performance = 7;
  repeated IntentCount intent_distribution = 8;
  repeated string warnings = 9;
}
